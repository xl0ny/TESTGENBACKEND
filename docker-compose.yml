services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 10

  transport:
    build: ./transport
    ports:
      - "8081:8081"
    environment:
      HTTP_ADDR: ":8081"
      KAFKA_BROKERS: kafka:29092
      KAFKA_TOPIC_SEGMENTS: transport-segments
      ASSEMBLY_INTERVAL_SEC: ${ASSEMBLY_INTERVAL_SEC:-2}
      TIMEOUT_CYCLES: ${TIMEOUT_CYCLES:-3}
      SEGMENT_LOSS_PERCENT: ${SEGMENT_LOSS_PERCENT:-8}
      AGENT_BASE_URL: ${AGENT_BASE_URL:-http://host.docker.internal:8082}
    depends_on:
      kafka:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

  app:
    build: ./app
    ports:
      - "8080:8080"
    environment:
      APP_PORT: 8080
      TRANSPORT_BASE_URL: http://transport:8081
      RECEIVE_WAIT_MS: 3000
      RECEIVE_MAX_ATTEMPTS: 40
      RECEIVE_POLL_INTERVAL_MS: 500
    depends_on:
      - transport
